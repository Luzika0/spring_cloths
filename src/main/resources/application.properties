spring.application.name=Spring_Cloths

# Server config
server.port=4000
server.address=127.0.0.1           # Only accessible locally
server.servlet.context-path=/api   # All endpoints under /api

# Database config
spring.datasource.url=jdbc:mysql://localhost:3306/cloths_db
spring.datasource.username=Panha
spring.datasource.password=Panha20032005
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# File upload limits
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Optional: Actuator endpoints for health checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always