
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spring Security Auth </title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #111827;
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.5);
        }

        .form-control {
            background: #1f2937;
            border: none;
            color: white;
            
        }

        .form-control:focus {
            background: #1f2937;
            color: white;
            box-shadow: none;
            border: 1px solid #3b82f6;
        }

        .form-control::placeholder {
            color: #000000;
            opacity: 0.5;
        }

        .form-control::-webkit-input-placeholder {
            color: #cacaca;
            opacity: 0.5;
        }

        .form-control::-moz-placeholder {
            color: #ffffff;
            opacity: 1;
        }

        .form-control:-ms-input-placeholder {
            color: #94a3b8;
            opacity: 1;
        }

        .btn-primary {
            background: #3b82f6;
            border: none;
        }

        .btn-primary:hover {
            background: #2563eb;
        }

        .tab-btn {
            cursor: pointer;
            color: #94a3b8;
        }

        .tab-btn.active {
            color: white;
            border-bottom: 2px solid #3b82f6;
        }

        #result {
            margin-top: 15px;
            font-size: 14px;
            color: #22c55e;
        }
        .text_color{
            color: white;

        }
    </style>
</head>

<body>

<div class="card p-4" style="width: 380px;">

    <h3 class="text-center mb-3 text_color">Spring Security Auth</h3>

    <!-- Tabs -->
    <div class="d-flex justify-content-between mb-3">
        <div class="tab-btn active" onclick="showTab('login')">Login</div>
        <div class="tab-btn" onclick="showTab('register')">Register</div>
    </div>

    <!-- LOGIN -->
    <div id="loginForm">
        <input  class="form-control mb-2" id="loginUsername" placeholder="Username" required >
        <input  class="form-control mb-2" id="loginPassword" type="password" placeholder="Password" required >

        <button class="btn btn-primary w-100" onclick="login()">Login</button>
    </div>

    <!-- REGISTER -->
    <div id="registerForm" style="display:none;" >
        <input class="form-control mb-2" id="regUsername" placeholder="Username " required >
        <input class="form-control mb-2" id="regPassword" type="password" placeholder="Password " required >
        <input class="form-control mb-2" id="regConfirmPassword" type="password" placeholder="Confirm Password " required >
        
        <select class="form-control mb-2" id="regRole" placeholder="Select Role ">
            <option value="">Select Role</option>
            <option value="USER">USER</option>
            <option value="ADMIN">ADMIN</option>

        </select>

        <button class="btn btn-primary w-100" onclick="register()">Register</button>
    </div>

    <div id="result"></div>

</div>

<script>
function showTab(tab) {
    document.getElementById("loginForm").style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById("registerForm").style.display = tab === 'register' ? 'block' : 'none';

    document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
    event.target.classList.add("active");
}
function isAlphanumeric(str) {
    return /^[a-zA-Z0-9]+$/.test(str);
}
async function register() {
    if(!regUsername.value || !regPassword.value || !regConfirmPassword.value || !regRole.value) {
        document.getElementById("result").innerText = "Please fill in all fields";
        document.getElementById("result").style.color = "yellow";
        return;
    }
    
    if(!isAlphanumeric(regUsername.value)) {
        document.getElementById("result").innerText = "Username can only contain letters and numbers";
        document.getElementById("result").style.color = "red";
        return;
    }
    
    if(!isAlphanumeric(regPassword.value)) {
        document.getElementById("result").innerText = "Password can only contain letters and numbers";
        document.getElementById("result").style.color = "red";
        return;
    }
    
    if(regPassword.value !== regConfirmPassword.value) {
        document.getElementById("result").innerText = "Passwords don't match";
        document.getElementById("result").style.color = "red";
        return;
    }
    
    const res = await fetch("/auth/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            username: regUsername.value,
            password: regPassword.value,
            role: regRole.value
        })
    });

    document.getElementById("result").innerText = await res.text();
    document.getElementById("result").style.color = "green";
}

// LOGIN
// LOGIN
async function login() {
    if(!loginUsername.value || !loginPassword.value) {
        document.getElementById("result").innerText = "Please fill in all fields";
        document.getElementById("result").style.color = "yellow";
        return;
    }
    
    if(!isAlphanumeric(loginUsername.value)) {
        document.getElementById("result").innerText = "Username can only contain letters and numbers";
        document.getElementById("result").style.color = "red";
        return;
    }
    
    if(!isAlphanumeric(loginPassword.value)) {
        document.getElementById("result").innerText = "Password can only contain letters and numbers";
        document.getElementById("result").style.color = "red";
        return;
    }
    
    const res = await fetch("/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            username: loginUsername.value,
            password: loginPassword.value
        })
    });
    
    // Parse JSON response
    const data = await res.json();
    
    if (data.jwtToken) {
        const token = data.jwtToken;
        localStorage.setItem("jwtToken", token);
        
        // Copy token to clipboard and show alert
        navigator.clipboard.writeText(token).then(() => {
            alert("✅ Login success! Token copied to clipboard. Redirecting to Swagger UI...");
        }).catch(err => {
            alert("✅ Login success! Failed to copy token: " + err + ". Redirecting to Swagger UI...");
        });
        
        // Copy token to clipboard and show alert
        navigator.clipboard.writeText(token).then(() => {
            alert("✅ Login success! Token copied to clipboard. Redirecting to Swagger UI...");
        }).catch(err => {
            alert("✅ Login success! Failed to copy token: " + err + ". Redirecting to Swagger UI...");
        });
        
        document.getElementById("result").innerText = "✅ Login success! Redirecting to Swagger UI...";
        document.getElementById("result").style.color = "green";
        
        // Redirect to custom Swagger UI after 1.5 seconds
        setTimeout(() => {
            window.location.href = "/swagger-ui/index.html";
            
        }, 1500);
            
    } else {
        document.getElementById("result").innerText = "❌ Login failed: Invalid response";
        document.getElementById("result").style.color = "red";
    }
}
</script>

</body>
</html>
